<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabelas de Campeonatos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #16a085;
            --danger: #e74c3c;
            --bg: #f5f6fa;
            --text: #2f3640;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--primary);
            margin-top: 5px;
            margin-bottom: 5px;
        }

        h2 { font-size: 20px; }
        h3 { font-size: 16px; color: #7f8c8d; }

        .no-print {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #dcdde1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        select, input, button, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-danger { background-color: var(--danger); }
        .btn-print { background-color: var(--primary); margin-top: 20px; }

        /* Configuração estrutural para folha em pé */
        .multi-chaves {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .bloco-chave {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            background: #fff;
            page-break-inside: avoid; /* Não quebra a chave no meio da folha */
        }

        .chaveamento {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .fase {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex: 1;
            margin: 0 5px;
        }

        .jogo-mata {
            background: #f8f9fa;
            border: 2px solid var(--primary);
            border-radius: 6px;
            padding: 6px;
            margin: 8px 0;
        }

        .time-chave {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            font-size: 13px;
        }

        .time-chave span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 110px; /* Evita que nomes gigantes quebrem o layout em pé */
        }

        .resultado-input {
            width: 30px;
            text-align: center;
            border: 1px solid #bdc3c7;
            padding: 2px;
            border-radius: 3px;
            height: 20px;
            font-size: 12px;
        }

        /* Forçar Impressão em formato Retrato (Em Pé) */
        @media print {
            @page {
                size: portrait;
                margin: 0.8cm;
            }
            body { background: white; color: black; padding: 0; }
            .no-print { display: none !important; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .jogo-mata { border: 2px solid #000 !important; background: white !important; }
            .resultado-input { border: 1px solid #000 !important; background: transparent; }
            .bloco-chave { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo-torneio">Gerador de Campeonatos</h1>
    
    <div class="no-print">
        <div class="form-group">
            <label for="nome-esporte">Nome do Esporte / Competição:</label>
            <input type="text" id="nome-esporte" placeholder="Ex: Copa Sesc de Futsal" oninput="salvarDados()">
        </div>

        <div class="form-group">
            <label for="qtd-chaves">Quantidade de Chaves na página:</label>
            <select id="qtd-chaves" onchange="alternarTextareas(); salvarDados();">
                <option value="1">1 Chaveamento</option>
                <option value="2">2 Chaveamentos (Máximo por página)</option>
            </select>
        </div>

        <div class="form-group" id="grupo-chave1">
            <label id="label-chave1">Times da Chave 1 (um por linha):</label>
            <textarea id="times-chave1" rows="5" placeholder="Time A&#10;Time B&#10;Time C&#10;Time D" oninput="salvarDados()"></textarea>
        </div>

        <div class="form-group" id="grupo-chave2" style="display: none;">
            <label>Times da Chave 2 (um por linha):</label>
            <textarea id="times-chave2" rows="5" placeholder="Time E&#10;Time F&#10;Time G&#10;Time H" oninput="salvarDados()"></textarea>
        </div>

        <button onclick="gerarCampeonato()">Gerar / Atualizar Chaveamentos</button>
        <button class="btn-danger" onclick="limparComSenha()">Excluir / Limpar Tudo</button>
    </div>

    <!-- Area de Impressão -->
    <div id="espaco-campeonato" class="multi-chaves"></div>

    <button class="no-print btn-print" id="btn-imprimir" onclick="window.print()" style="display: none;">Imprimir / Salvar em PDF (Folha em Pé)</button>
</div>

<script>
    const SENHA_CORRETA = "26";

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    window.onload = function() {
        carregarDadosSalvos();
    };

    function alternarTextareas() {
        const qtd = document.getElementById('qtd-chaves').value;
        document.getElementById('grupo-chave2').style.display = qtd == 2 ? "block" : "none";
        document.getElementById('label-chave1').innerText = qtd == 2 ? "Times da Chave 1 (um por linha):" : "Times do Campeonato (um por linha):";
    }

    function salvarDados() {
        localStorage.setItem('nomeEsporte', document.getElementById('nome-esporte').value);
        localStorage.setItem('qtdChaves', document.getElementById('qtd-chaves').value);
        localStorage.setItem('times1', document.getElementById('times-chave1').value);
        localStorage.setItem('times2', document.getElementById('times-chave2').value);
    }

    function carregarDadosSalvos() {
        if (localStorage.getItem('nomeEsporte')) document.getElementById('nome-esporte').value = localStorage.getItem('nomeEsporte');
        if (localStorage.getItem('qtdChaves')) {
            document.getElementById('qtd-chaves').value = localStorage.getItem('qtdChaves');
            alternarTextareas();
        }
        if (localStorage.getItem('times1')) document.getElementById('times-chave1').value = localStorage.getItem('times1');
        if (localStorage.getItem('times2')) document.getElementById('times-chave2').value = localStorage.getItem('times2');
        
        if (localStorage.getItem('times1')) gerarCampeonato();
    }

    function limparComSenha() {
        if (prompt("Digite a senha para confirmar a exclusão:") === SENHA_CORRETA) {
            localStorage.clear();
            location.reload();
        } else {
            alert("Senha incorreta!");
        }
    }

    function criarEstruturaChave(times, numeroChave) {
        if (times.length < 2) return "";

        let html = `<div class="bloco-chave">`;
        html += `<h2>Chaveamento ${numeroChave}</h2>`;
        html += `<div class="chaveamento">`;

        // Confrontos Iniciais
        html += `<div class="fase"><h3>Jogos</h3>`;
        for (let i = 0; i < times.length; i += 2) {
            let t1 = times[i];
            let t2 = times[i+1] ? times[i+1] : "A definir";
            html += `
                <div class="jogo-mata">
                    <div class="time-chave"><span title="${t1}">${t1}</span><input type="text" class="resultado-input"></div>
                    <div class="time-chave"><span title="${t2}">${t2}</span><input type="text" class="resultado-input"></div>
                </div>`;
        }
        html += `</div>`;

        // Próxima Fase / Semifinal
        let prox = Math.ceil(times.length / 4);
        if (prox >= 1) {
            html += `<div class="fase"><h3>Fase Final</h3>`;
            for (let i = 0; i < prox; i++) {
                html += `
                    <div class="jogo-mata">
                        <div class="time-chave"><span>Vencedor ${2*i+1}</span><input type="text" class="resultado-input"></div>
                        <div class="time-chave"><span>Vencedor ${2*i+2}</span><input type="text" class="resultado-input"></div>
                    </div>`;
            }
            html += `</div>`;
        }

        // Vencedor
        html += `<div class="fase" style="max-width: 130px;"><h3>🏆 Campeão</h3>`;
        html += `<div class="jogo-mata" style="text-align:center; font-weight:bold; border-color:#f1c40f;"><span style="color:#f39c12; max-width: 100%;">A DEFINIR</span></div>`;
        html += `</div>`;

        html += `</div></div>`;
        return html;
    }

    function gerarCampeonato() {
        const esporte = document.getElementById('nome-esporte').value || "Meu Campeonato";
        const qtd = parseInt(document.getElementById('qtd-chaves').value);
        document.getElementById('titulo-torneio').innerText = esporte;

        const espaco = document.getElementById('espaco-campeonato');
        espaco.innerHTML = "";

        let t1 = document.getElementById('times-chave1').value.split('\n').map(l => l.trim()).filter(l => l !== "");
        let t2 = document.getElementById('times-chave2').value.split('\n').map(l => l.trim()).filter(l => l !== "");

        let conteudoHTML = "";
        conteudoHTML += criarEstruturaChave(t1, qtd > 1 ? "1" : "");
        if (qtd == 2) conteudoHTML += criarEstruturaChave(t2, "2");

        if (conteudoHTML === "") {
            alert("Por favor, insira pelo menos 2 times na Chave 1.");
            return;
        }

        espaco.innerHTML = conteudoHTML;
        document.getElementById('btn-imprimir').style.display = "block";
    }
</script>
</body>
</html>
